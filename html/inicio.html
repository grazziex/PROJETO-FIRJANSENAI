<header>

        </div> <!-- Fecha a div da logo -->
        <nav class="menu"> <!-- Área de navegação (menu do site) -->
            <ul> <!-- Lista não ordenada para organizar os itens do menu -->
                <li><a href="../html/inicio.html">Início</a></li>
                <!-- Item do menu que leva para a página inicial -->
                <li><a href="../html/resenhas.html">Resenhas</a></li>
                <!-- Item do menu que leva para a página de resenhas -->
                <li><a href="../html/sobre-nos.html">Sobre nós</a></li>

<div class="carousel-wrapper"> <!-- Container externo do carrossel -->

        <section class="slide" id="slide1"> <!-- Primeiro slide do carrossel -->
            <a href="#slide4" class="prev">&#10094;</a>
            <!-- Botão para voltar ao slide anterior (slide4) -->
            <a href="#slide2" class="next">&#10095;</a>
            <!-- Botão para avançar para o próximo slide (slide2) -->
            <img src="../images/1.png" alt="">
            <!-- Imagem exibida no slide 1 -->
        </section> <!-- Fim do slide 1 -->
        <section class="slide" id="slide2"> <!-- Segundo slide -->
            <a href="#slide1" class="prev">&#10094;</a>
            <!-- Botão para voltar ao slide 1 -->
            <img src="../images/2.png" alt="">

            <a href="#slide3" class="next">&#10095;</a>
            <!-- Botão para avançar para o slide 3 -->
        </section> <!-- Fim do slide 2 -->
        <section class="slide" id="slide3"> <!-- Terceiro slide -->
            <a href="#slide2" class="prev">&#10094;</a>
            <!-- Volta para o slide 2 -->
            <a href="#slide4" class="next">&#10095;</a>

            <a href="#slide3" class="prev">&#10094;</a>

            <a href="#slide1" class="next">&#10095;</a>
            <!-- Avança para o slide 1 (reinicia o carrossel) -->
